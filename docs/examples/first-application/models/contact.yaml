entity: crm.Contact
label: Contacts
display: "{name}"
search_fields: [name, email]

expose:
  tui: true
  rest: {path: contacts, operations: [list, get, create, update, delete]}
  mcp:
    resources: [schema, record]
    tools: [search, create, update, delete]

permissions:
  list: crm.contact.read
  read: crm.contact.read
  create: crm.contact.write
  update: crm.contact.write
  delete: crm.contact.delete

fields:
  id: {type: integer, primary_key: true}
  name: {type: string, length: 120, required: true, searchable: true}
  email: {type: string, length: 254, validation: email, searchable: true}
  active: {type: boolean, default: true}
