# TIDE application metadata.
view: sales.Invoice.edit
base: generated.edit
mode: overlay
extends: standard_form

layout:
  - group: Invoice
    rows:
      - [number, invoice_date, status, currency]
      - [customer]

  - collection: lines
    view: sales.InvoiceLine.inline_edit
    actions: [add, apply, remove]

  - group: Totals
    align: right
    rows:
      - [total]

  - group: Posting
    rows:
      - [posted_at, posted_by, version]

fields:
  customer:
    editor: lookup
    lookup_view: crm.Customer.lookup
    allow_create: true
    create_view: crm.Customer.edit

actions: [cancel, save, post]

surfaces:
  tui:
    minimum_width: 100
    collection_height: 14
