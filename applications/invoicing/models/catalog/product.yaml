# TIDE application metadata.
entity: catalog.Product
label: Products
display: "{code} - {name}"
search_fields: [code, name]

expose:
  tui: true
  rest: {path: products, operations: [list, get, create, update, delete]}
  mcp:
    resources: [schema, record, audit]
    tools: [search, create, update, delete]

permissions:
  list: catalog.product.read
  read: catalog.product.read
  create: catalog.product.write
  update: catalog.product.write
  delete: catalog.product.delete
  audit: catalog.product.audit

fields:
  id:         {type: integer, primary_key: true, audit: none}
  code:
    type: string
    length: 30
    required: true
    unique: true
    edit_mask: {regex: "[A-Z][A-Z0-9-]{0,29}"}
    audit: values
  name:       {type: string, length: 120, required: true, searchable: true, audit: values}
  unit_price:
    type: decimal
    precision: 12
    scale: 2
    required: true
    minimum: 0
    format: money
    edit_mask: "0.00"
    audit: values
  active:     {type: boolean, default: true, audit: values}
