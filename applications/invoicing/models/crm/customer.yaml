# TIDE application metadata.
entity: crm.Customer
label: Customers
display: "{code} - {name}"
search_fields: [code, name, email]

expose:
  tui: true
  rest: {path: customers, operations: [list, get, create, update, delete]}
  mcp: {resources: [schema, record], tools: [search]}

permissions:
  list: crm.customer.read
  read: crm.customer.read
  create: crm.customer.write
  update: crm.customer.write
  delete: crm.customer.delete
  audit: crm.customer.audit

fields:
  id:     {type: integer, primary_key: true, audit: none}
  code:
    type: string
    length: 20
    required: true
    unique: true
    edit_mask: {regex: "[A-Z][A-Z0-9-]{0,19}"}
    audit: values
  name:   {type: string, length: 120, required: true, searchable: true, audit: values}
  email:  {type: string, length: 254, unique: true, validation: email}
  active: {type: boolean, default: true, audit: values}

  invoices:
    type: collection
    target: sales.Invoice
    inverse: customer
