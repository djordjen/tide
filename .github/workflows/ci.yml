name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: ruff check src tests applications/invoicing/actions.py
      - run: tide model validate applications/invoicing
      - run: python -m build
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
